name: publish-logger-plugin

on:
  push:
    tags:
      - 'snakesee-logger-[0-9]+.[0-9]+.[0-9]+'

env:
  UV_VERSION: 0.8.22

jobs:
  on-main-branch-check:
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.contains_tag.outputs.retval }}
    steps:
      - name: git config --global remote.origin.followRemoteHEAD never
        run: git config --global remote.origin.followRemoteHEAD never

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: rickstaa/action-contains-tag@a9ff27d505ba2bf074a2ebb48b208e76d35ff308 # v1
        id: contains_tag
        with:
          reference: "main"
          tag: "${{ github.ref_name }}"

  tests:
    name: tests
    needs: on-main-branch-check
    if: ${{ needs.on-main-branch-check.outputs.on_main == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        PYTHON_VERSION: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "${{ env.UV_VERSION }}"
          python-version: "${{ matrix.PYTHON_VERSION }}"
          enable-cache: true
          cache-suffix: "logger-${{ matrix.PYTHON_VERSION }}"

      - name: Install dependencies
        working-directory: snakemake-logger-plugin-snakesee
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run tests
        working-directory: snakemake-logger-plugin-snakesee
        run: uv run pytest tests/ -v

  build-sdist:
    name: build source distribution
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "${{ env.UV_VERSION }}"
          python-version: "3.12"
          enable-cache: true

      - name: Build package
        working-directory: snakemake-logger-plugin-snakesee
        run: uv build --sdist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: logger-plugin-sdist
          path: snakemake-logger-plugin-snakesee/dist/*.tar.gz

  publish-to-pypi:
    runs-on: ubuntu-latest
    needs: build-sdist
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: packages
          pattern: 'logger-plugin-*'
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: packages/
          skip-existing: true
          verbose: true
